server:
  port: 8082

spring:
  application:
    name: reservas-service

  datasource:
    url: jdbc:mysql://localhost:3306/bd_reservas_service?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: false

springdoc:
  swagger-ui:
    path: /doc/swagger-ui/index.html
  api-docs:
    path: /api-docs

services:
  herramientas:
    url: http://localhost:8081/api/v1/herramientas
  usuarios:
    url: http://localhost:8082/api/v1/usuarios
