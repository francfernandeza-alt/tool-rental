server:
  port: 8081

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: usuario-service
              uri: lb://USUARIO-SERVICE
              predicates:
                - Path=/api/v1/usuarios/**

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

  api-docs:
    enabled: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true